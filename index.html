<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>body { font-family: 'Inter', sans-serif; } .custom-field { display: none; }</style>
</head>
<body class="min-h-screen bg-slate-100 p-2 sm:p-4 flex flex-col items-center justify-start">

  <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden mb-8 mt-4">
    <div id="headerBar" class="bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-5 text-white flex items-center justify-between">
      <div class="text-left">
        <h1 class="text-xl font-bold tracking-tight">VLT - ĐĂNG KÝ THÔNG TIN</h1>
        <p class="text-indigo-100 text-xs mt-0.5">Chọn Nhà máy ứng tuyển và quét mã góc phải thẻ CCCD.</p>
      </div>
      <div class="flex items-center space-x-2">
        <label class="p-2.5 bg-white/20 hover:bg-white/30 rounded-full transition-all text-white cursor-pointer flex items-center justify-center">
          <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="scanFromImageFile(this)">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </label>
        <button type="button" onclick="toggleCamera()" class="p-2.5 bg-white/20 hover:bg-white/30 rounded-full transition-all text-white outline-none flex items-center justify-center cursor-pointer">
          <svg id="camIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
      </div>
    </div>

    <div id="statusContainer" class="bg-indigo-50 border-b border-indigo-100 hidden p-3 text-center text-xs text-indigo-700 font-medium"><span id="statusText">Đang xử lý...</span></div>
    <div id="camContainer" class="bg-slate-900 overflow-hidden transition-all duration-300 max-h-0"><div class="p-4 flex flex-col items-center"><div id="qrReader" class="w-full rounded-2xl overflow-hidden bg-black max-w-[280px]"></div></div></div>

    <form id="registerForm" class="p-6 space-y-5 block" onsubmit="submitRegister(event)">
      <div>
        <label class="block text-sm font-bold text-slate-900 mb-1.5" for="factoryCode">Nhà máy đăng ký làm việc *</label>
        <select id="factoryCode" required onchange="onFactoryChange()" class="w-full px-4 py-2.5 rounded-xl border border-indigo-300 text-slate-900 font-semibold bg-indigo-50/50">
          <option value="">-- Chọn Nhà máy làm việc --</option>
            <option value="HONHAI-FK">HONHAI-FK / FUKANG</option>
            <option value="LUXE QC2&3">LUXE QC2&3</option>
            <option value="LUXE QC1">LUXE QC1</option>
            <option value="LUXE VT">LUXE VT</option>
            <option value="GTK NAM SƠN">GTK NAM SƠN</option>
            <option value="ADTEK">ADTEK</option>
            <option value="LENS">LENS</option>
            <option value="WNC HÀ NAM">WNC HÀ NAM</option>
            <option value="FUSHAN">FUSHAN</option>
            <option value="NEWWING">NEWWING</option>
            <option value="FOX-QUẢNG NINH">FOX-QUẢNG NINH</option>
            <option value="AMPHENOL">AMPHENOL</option>
            <option value="BIEL VSIP">BIEL VSIP</option>
            <option value="BIEL HD">BIEL HP</option>
        </select>
      </div>
      
      <div id="fieldsBlock" class="space-y-4 pt-2 hidden">
        <div id="div_interviewDate" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="interviewDate">Ngày phỏng vấn *</label><input type="date" id="interviewDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_fullname" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="fullname">Họ và tên *</label><input type="text" id="fullname" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_gender" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5">Giới tính *</label><div class="flex items-center space-x-6 py-1"><label class="flex items-center cursor-pointer"><input type="radio" name="gender" id="gender_nam" value="Nam" class="w-4 h-4"><span class="ml-2">Nam</span></label><label class="flex items-center cursor-pointer"><input type="radio" name="gender" id="gender_nu" value="Nữ" class="w-4 h-4"><span class="ml-2">Nữ</span></label></div></div>
        <div id="div_dob" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="dob">Ngày sinh *</label><input type="date" id="dob" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        
        <!-- TRƯỜNG THÔNG TIN MỚI: TÌNH TRẠNG HÔN NHÂN -->
        <div id="div_maritalStatus" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="maritalStatus">Tình trạng hôn nhân *</label><select id="maritalStatus" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"><option value="Độc thân">Độc thân</option><option value="Đã kết hôn">Đã kết hôn</option><option value="Ly hôn">Ly hôn</option></select></div>
        
        <div id="div_phone" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="phone">Mobile *</label><input type="tel" id="phone" pattern="[0-9]{10}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_cccd" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="cccd">CCCD *</label><input type="text" id="cccd" pattern="[0-9]{12}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_cccdDate" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="cccdDate">Ngày cấp CCCD *</label><input type="text" id="cccdDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_cccdExpiry" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="cccdExpiry">Ngày hết hạn CCCD *</label><input type="text" id="cccdExpiry" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_ethnicity" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="ethnicity">Dân tộc *</label><input type="text" id="ethnicity" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        
        <!-- KHỐI THÔNG TIN NGƯỜI THÂN KHẨN CẤP ĐƯỢC BỔ SUNG YÊU CẦU CHO MẪU FUSHAN -->
        <div id="div_relativeName" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="relativeName">Họ tên người thân khẩn cấp *</label><input type="text" id="relativeName" class="w-full px-4 py-2.5 rounded-xl border border-slate-300" placeholder="Ví dụ: Nguyễn Văn A"></div>
        <div id="div_relativeRelation" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="relativeRelation">Mối quan hệ người thân *</label><input type="text" id="relativeRelation" class="w-full px-4 py-2.5 rounded-xl border border-slate-300" placeholder="Ví dụ: Bố, Mẹ, Vợ, Anh trai..."></div>
        <div id="div_relativePhone" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="relativePhone">Số điện thoại người thân *</label><input type="tel" id="relativePhone" pattern="[0-9]{10}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_relativeAddress" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="relativeAddress">Địa chỉ người thân *</label><input type="text" id="relativeAddress" class="w-full px-4 py-2.5 rounded-xl border border-slate-300" placeholder="Số nhà, Xã, Huyện, Tỉnh"></div>
        
        <div id="div_fullAddress" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="fullAddress">Địa chỉ thường trú *</label><input type="text" id="fullAddress" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_socialInsurance" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="socialInsurance">Số BHXH</label><input type="text" id="socialInsurance" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_schoolName" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="schoolName">Tên trường tốt nghiệp *</label><input type="text" id="schoolName" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        <div id="div_educationLevel" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="educationLevel">Tốt nghiệp cấp mấy *</label><select id="educationLevel" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"><option value="">-- Chọn --</option><option value="THCS (Cấp 2)">THCS (Cấp 2)</option><option value="THPT (Cấp 3)">THPT (Cấp 3)</option><option value="Trung cấp / Cao đẳng">Trung cấp / Cao đẳng</option><option value="Đại học">Đại học</option></select></div>
        <div id="div_note" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="note">Ghi Chú</label><input type="text" id="note" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
        
        <button type="submit" id="btnSubmit" class="w-full mt-4 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold py-3 rounded-xl shadow-md cursor-pointer"><span>Xác nhận nộp</span></button>
      </div>
    </form>
  </div>

  <div id="successModal" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 backdrop-blur-sm z-50">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center border border-slate-200 shadow-2xl">
      <div id="modalIcon" class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3 text-emerald-600 text-3xl">✓</div>
      <h2 id="modalTitle" class="text-xl font-bold text-slate-800 mb-2">Thành Công!</h2>
      <p id="modalMsg" class="text-sm text-slate-600 mb-5 leading-relaxed bg-slate-50 p-3 rounded-xl border text-center font-medium"></p>
      <button onclick="closeModal()" class="w-full bg-slate-800 text-white font-medium py-2.5 rounded-xl">Đóng</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwafkkg3DyJ9sxs9PiMjP_ZxkXf4rE09lw_Fy39AE5q-0Uhr5gUHDDmFFZtZUJfs81ihQ/exec"; 

    let html5QrCode = null, isCamOpen = false;
    const allFieldIds = ['interviewDate', 'fullname', 'dob', 'maritalStatus', 'phone', 'cccd', 'cccdDate', 'cccdExpiry', 'ethnicity', 'relativeName', 'relativeRelation', 'relativePhone', 'relativeAddress', 'fullAddress', 'socialInsurance', 'schoolName', 'educationLevel', 'note'];
    const factorySelect = document.getElementById('factoryCode'), fieldsBlock = document.getElementById('fieldsBlock');
    let isLastSubmissionSuccess = false; // Biến cờ ghi nhận trạng thái nộp thành công

    function onFactoryChange() { 
      const fCode = factorySelect.value; 
      allFieldIds.forEach(id => { document.getElementById('div_' + id).style.display = 'none'; document.getElementById(id).removeAttribute('required'); }); 
      if (!fCode) { fieldsBlock.classList.add('hidden'); return; } 
      fieldsBlock.classList.remove('hidden'); document.getElementById('div_gender').style.display = 'block'; 
      
      // Khai báo các trường hiển thị động theo form nhà máy
      const showFields = ['interviewDate', 'fullname', 'dob', 'phone', 'cccd', 'note']; 
      if (fCode === "FUSHAN") { 
        showFields.push('maritalStatus', 'cccdDate', 'fullAddress', 'relativeName', 'relativeRelation', 'relativePhone', 'relativeAddress'); 
      } else { 
        showFields.push('cccdDate', 'cccdExpiry', 'fullAddress'); 
      }
      showFields.forEach(id => { document.getElementById('div_' + id).style.display = 'block'; if (id !== 'note') document.getElementById(id).setAttribute('required', 'true'); }); 
    }

    function scanFromImageFile(inputElement) {
      const statusBox = document.getElementById('statusContainer'), statusText = document.getElementById('statusText');
      if (!inputElement.files || inputElement.files.length === 0) return;
      statusBox.classList.remove('hidden'); statusText.innerText = "⏳ Đang quét QR...";
      new Html5Qrcode("qrReader").scanFile(inputElement.files[0], true).then(decodedText => {
        statusText.innerText = "✅ Thành công!"; handleDecodedText(decodedText);
        setTimeout(() => statusBox.classList.add('hidden'), 1500); inputElement.value = ""; 
      }).catch(err => { statusText.innerText = "❌ Không tìm thấy QR!"; inputElement.value = ""; });
    }

    function toggleCamera() {
      const container = document.getElementById('camContainer'), icon = document.getElementById('camIcon');
      if (!isCamOpen) {
        container.style.maxHeight = "400px"; html5QrCode = new Html5Qrcode("qrReader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 230 }, (msg) => { handleDecodedText(msg); stopCamera(); }, (err) => {}).then(() => { isCamOpen = true; icon.innerHTML = '<path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke="currentColor"></path>'; });
      } else { stopCamera(); }
    }

    function stopCamera() {
      if (html5QrCode && isCamOpen) {
        html5QrCode.stop().then(() => { document.getElementById('camContainer').style.maxHeight = "0px"; isCamOpen = false; });
      }
    }

    function handleDecodedText(rawText) {
      const parts = rawText.split('|');
      if (parts.length >= 6) {
        document.getElementById('cccd').value = parts[0].trim();
        document.getElementById('fullname').value = parts[2].trim();
        if(parts[3].length === 8) document.getElementById('dob').value = parts[3].substring(4,8)+"-"+parts[3].substring(2,4)+"-"+parts[3].substring(0,2);
        if(parts[4].trim() === "Nam") document.getElementById('gender_nam').checked = true; else document.getElementById('gender_nu').checked = true;
        document.getElementById('fullAddress').value = parts[5].trim();
        if(parts[6].length === 8) document.getElementById('cccdDate').value = parts[6].substring(0,2)+"/"+parts[6].substring(2,4)+"/"+parts[6].substring(4,8);
      }
    }

    function submitRegister(e) {
      e.preventDefault(); const btn = document.getElementById('btnSubmit'); btn.disabled = true; btn.innerHTML = "Đang xử lý...";
      const genderRadio = document.querySelector('input[name="gender"]:checked');
      const payload = { action: 'register', factoryName: factorySelect.value, gender: genderRadio ? genderRadio.value : "" };
      allFieldIds.forEach(id => { var el = document.getElementById(id); payload[id] = el ? el.value.trim() : ""; });

      // Định dạng ngày gộp DD/MM/YYYY chuẩn gửi đi
      if (payload.dob) {
        var p = payload.dob.split('-');
        if(p.length === 3) { payload.dob_formatted = p[2] + "/" + p[1] + "/" + p[0]; payload.dob_day = p[2]; payload.dob_month = p[1]; payload.dob_year = p[0]; }
      }

      // Phân tách cấu trúc địa chỉ thường trú
      if (payload.fullAddress) {
        const parts = payload.fullAddress.split(',').map(item => item.trim());
        payload.address_province = parts.length >= 1 ? parts[parts.length - 1] : "";
        payload.address_district = parts.length >= 2 ? parts[parts.length - 2] : "";
        payload.address_commune = parts.length >= 3 ? parts.slice(0, parts.length - 2).join(', ') : (parts.length === 2 ? parts[0] : "");
      }

      // Phân tách ngày cấp CCCD thành các trường nhỏ gửi đi
      if (payload.cccdDate) {
        const parts = payload.cccdDate.replace(/-/g, '/').split('/');
        if (parts.length === 3) { payload.cccd_day = parts[0]; payload.cccd_month = parts[1]; payload.cccd_year = parts[2]; }
      }

      fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) })
      .then(res => res.json()).then(data => {
        btn.disabled = false; btn.innerHTML = "<span>Xác nhận nộp</span>";
        if(data && data.success) { 
          isLastSubmissionSuccess = true; // Bấm nút "Đóng" modal sẽ reset form về trắng
          showModal(true, "Thành Công!", data.message); 
        } else { 
          isLastSubmissionSuccess = false; // Lỗi trùng CCCD / lỗi nghiệp vụ, không reset form để họ sửa thông tin
          showModal(false, "Thất Bại", data.message); 
        }
      })
      .catch(err => { 
        btn.disabled = false; btn.innerHTML = "<span>Xác nhận nộp</span>"; 
        isLastSubmissionSuccess = true; // Gửi ngầm (Offline) cũng được tính là hoàn thành phiên đăng ký
        showModal(true, "Thành Công!", "Dữ liệu hồ sơ đăng ký đã gửi thành công ngầm."); 
      });
    }

    function showModal(isSuccess, title, msg) {
      const modalIcon = document.getElementById('modalIcon');
      if (isSuccess) {
        modalIcon.innerText = "✓";
        modalIcon.className = "w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3 text-emerald-600 text-3xl";
      } else {
        modalIcon.innerText = "✕";
        modalIcon.className = "w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3 text-red-600 text-3xl";
      }
      document.getElementById('modalTitle').innerText = title; 
      document.getElementById('modalMsg').innerText = msg;
      document.getElementById('successModal').classList.remove('hidden');
    }

    // HÀM RESET TOÀN BỘ FORM VÀ ĐƯA GIAO DIỆN VỀ TRẠNG THÁI KHỞI ĐẦU
    function resetMyForm() {
      // 1. Reset form về giá trị trống
      document.getElementById('registerForm').reset();
      
      // 2. Bỏ tích chọn giới tính
      const genderRadios = document.querySelectorAll('input[name="gender"]');
      genderRadios.forEach(radio => radio.checked = false);

      // 3. Ẩn toàn bộ các khối trường thông tin động
      fieldsBlock.classList.add('hidden');
      allFieldIds.forEach(id => {
        const div = document.getElementById('div_' + id);
        if (div) div.style.display = 'none';
        const el = document.getElementById(id);
        if (el) el.removeAttribute('required');
      });
      
      console.log("Đã làm sạch toàn bộ dữ liệu form!");
    }

    function closeModal() { 
      document.getElementById('successModal').classList.add('hidden'); 
      // Chỉ reset form khi giao dịch thực sự thành công/gửi ngầm thành công
      if (isLastSubmissionSuccess) {
        resetMyForm();
      }
    }
  </script>
</body>
</html>
