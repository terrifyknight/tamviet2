<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HỆ THỐNG QUẢN LÝ LAO ĐỘNG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>body { font-family: 'Inter', sans-serif; } .custom-field { display: none; }</style>
</head>
<body class="min-h-screen bg-slate-100 p-2 sm:p-4 flex flex-col items-center justify-start">

  <div class="w-full max-w-lg bg-white rounded-2xl p-1.5 shadow-md border border-slate-200 flex mb-4 z-10">
    <button onclick="switchMode('register')" id="tab-register" class="w-1/2 text-center py-2.5 rounded-xl text-sm font-bold transition-all bg-indigo-600 text-white shadow">
      📝 Đăng Ký Thông Tin
    </button>
    <button onclick="switchMode('checkin')" id="tab-checkin" class="w-1/2 text-center py-2.5 rounded-xl text-sm font-bold transition-all text-slate-600 hover:text-slate-900">
      ⏱️ Cổng Điểm Danh
    </button>
  </div>

  <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden mb-8">
    
    <div id="headerBar" class="bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-5 text-white flex items-center justify-between relative">
      <div class="text-left">
        <h1 id="mainTitle" class="text-xl font-bold tracking-tight">ĐĂNG KÝ THÔNG TIN</h1>
        <p id="subHeader" class="text-indigo-100 text-xs mt-0.5">Vui lòng chọn Nhà thầu trước khi nhập dữ liệu.</p>
      </div>
      
      <div class="flex items-center space-x-2">
        <label class="p-2.5 bg-white/20 hover:bg-white/30 rounded-full transition-all text-white cursor-pointer flex items-center justify-center" title="Tải ảnh CCCD từ máy để quét QR">
          <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="scanFromImageFile(this)">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
        </label>
        
        <button type="button" onclick="toggleCamera()" class="p-2.5 bg-white/20 hover:bg-white/30 rounded-full transition-all text-white outline-none flex items-center justify-center cursor-pointer" title="Quét trực tiếp bằng Camera">
          <svg id="camIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div id="statusContainer" class="bg-indigo-50 border-b border-indigo-100 hidden p-3 text-center text-xs text-indigo-700 font-medium">
      <span id="statusText">Đang xử lý hình ảnh...</span>
    </div>

    <div id="camContainer" class="bg-slate-900 overflow-hidden transition-all duration-300 max-h-0">
      <div class="p-4 flex flex-col items-center">
        <div id="qrReader" class="w-full rounded-2xl overflow-hidden bg-black max-w-[280px]"></div>
        <p class="text-[11px] text-indigo-300 mt-2 text-center leading-relaxed px-2" id="camTip">Đưa mã QR ở góc phải thẻ CCCD vào khung quét để hệ thống tự nhập</p>
      </div>
    </div>

    <form id="registerForm" class="p-6 space-y-5 block" onsubmit="submitRegister(event)">
      <div>
        <label class="block text-sm font-bold text-slate-900 mb-1.5" for="vendorCode">Nhà Thầu <span class="text-rose-500">*</span></label>
        <select id="vendorCode" required onchange="onVendorChange()" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-slate-900 font-medium bg-slate-50">
          <option value="">-- Chọn Mã Nhà Thầu của bạn --</option>
          <option value="Tâm Việt">Tâm Việt</option>
          <option value="VLT">VLT</option>
          <option value="DMT">DMT</option>
          <option value="TC">TC</option>
          <option value="Vinamex">Vinamex</option>
        </select>
      </div>
      
      <div id="dynamicFormContainer" class="hidden space-y-5">
        <div class="border-t border-slate-200 pt-4">
          <label class="block text-sm font-bold text-slate-900 mb-1.5" for="factoryCode">Nhà máy đăng ký làm việc <span class="text-rose-500">*</span></label>
          <select id="factoryCode" required onchange="onFactoryChange()" class="w-full px-4 py-2.5 rounded-xl border border-indigo-300 text-slate-900 font-semibold bg-indigo-50/50">
            <option value="">-- Chọn Nhà máy làm việc --</option>
            <option value="HONHAI-FK">HONHAI-FK / FUKANG</option>
            <option value="LUXE QC2&3">LUXE QC2&3</option>
            <option value="LUXE QC1">LUXE QC1</option>
            <option value="LUXE VT">LUXE VT</option>
            <option value="GTK NAM SƠN">GTK NAM SƠN</option>
            <option value="ADTEK">ADTEK</option>
            <option value="LENS">LENS</option>
            <option value="WNC HÀ NAM">WNC HÀ NAM</option>
            <option value="FUSHAN">FUSHAN</option>
            <option value="NEWWING">NEWWING</option>
            <option value="FOX-QUẢNG NINH">FOX-QUẢNG NINH</option>
          </select>
        </div>
        
        <div id="fieldsBlock" class="space-y-4 pt-2 hidden">
          <div id="div_interviewDate" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="interviewDate">Ngày phỏng vấn *</label><input type="date" id="interviewDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_fullname" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="fullname">Họ và tên *</label><input type="text" id="fullname" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_gender" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5">Giới tính *</label><div class="flex items-center space-x-6 py-1"><label class="flex items-center cursor-pointer"><input type="radio" name="gender" id="gender_nam" value="Nam" class="w-4 h-4"><span class="ml-2">Nam</span></label><label class="flex items-center cursor-pointer"><input type="radio" name="gender" id="gender_nu" value="Nữ" class="w-4 h-4"><span class="ml-2">Nữ</span></label></div></div>
          <div id="div_dob" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="dob">Ngày sinh *</label><input type="date" id="dob" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_phone" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="phone">Mobile *</label><input type="tel" id="phone" pattern="[0-9]{10}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_cccd" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="cccd">CCCD *</label><input type="text" id="cccd" pattern="[0-9]{12}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_cccdDate" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="cccdDate">Ngày cấp CCCD *</label><input type="date" id="cccdDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_cccdExpiry" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="cccdExpiry">Ngày hết hạn CCCD <span id="star_cccdExpiry">*</span></label><input type="date" id="cccdExpiry" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_ethnicity" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="ethnicity">Dân tộc *</label><input type="text" id="ethnicity" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_schoolName" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="schoolName">Tên trường tốt nghiệp *</label><input type="text" id="schoolName" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_educationLevel" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="educationLevel">Tốt nghiệp cấp mấy *</label><select id="educationLevel" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"><option value="">-- Chọn --</option><option value="THCS (Cấp 2)">THCS (Cấp 2)</option><option value="THPT (Cấp 3)">THPT (Cấp 3)</option><option value="Trung cấp / Cao đẳng">Trung cấp / Cao đẳng</option><option value="Đại học">Đại học</option></select></div>
          <div id="div_relativeName" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="relativeName">Họ tên người thân *</label><input type="text" id="relativeName" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_relativePhone" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="relativePhone">SĐT người thân *</label><input type="tel" id="relativePhone" pattern="[0-9]{10}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_fullAddress" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="fullAddress">Địa chỉ thường trú *</label><input type="text" id="fullAddress" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_bankAccount" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="bankAccount">STK Ngân hàng Vietcombank</label><input type="text" id="bankAccount" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_socialInsurance" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="socialInsurance">Số BHXH</label><input type="text" id="socialInsurance" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <div id="div_note" class="custom-field"><label class="block text-sm font-semibold text-slate-800 mb-1.5" for="note">Ghi Chú</label><input type="text" id="note" class="w-full px-4 py-2.5 rounded-xl border border-slate-300"></div>
          <button type="submit" id="btnSubmit" class="w-full mt-4 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold py-3 rounded-xl shadow-md cursor-pointer"><span>Xác nhận nộp</span></button>
        </div>
      </div>
    </form>

    <form id="checkinForm" class="p-6 space-y-5 hidden" onsubmit="submitCheckin(event)">
      <div>
        <label class="block text-sm font-bold text-slate-900 mb-1.5" for="ck_factory">Nhà máy phỏng vấn *</label>
        <select id="ck_factory" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-slate-900 font-medium bg-slate-50">
          <option value="">-- Chọn Nhà máy --</option>
          <option value="HONHAI-FK">HONHAI-FK / FUKANG</option>
          <option value="LUXE QC2&3">LUXE QC2&3</option>
          <option value="LUXE QC1">LUXE QC1</option>
          <option value="LUXE VT">LUXE VT</option>
          <option value="GTK NAM SƠN">GTK NAM SƠN</option>
          <option value="ADTEK">ADTEK</option>
          <option value="LENS">LENS</option>
          <option value="WNC HÀ NAM">WNC HÀ NAM</option>
          <option value="FUSHAN">FUSHAN</option>
          <option value="NEWWING">NEWWING</option>
          <option value="FOX-QUẢNG NINH">FOX-QUẢNG NINH</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-bold text-slate-900 mb-1.5" for="ck_cccd">Số CCCD Lao động (12 số) *</label>
        <input type="text" id="ck_cccd" required pattern="[0-9]{12}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm font-semibold tracking-wider text-slate-900" placeholder="Quét mã QR hoặc gõ tay trực tiếp">
      </div>
      <button type="submit" id="btnCheckin" class="w-full mt-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-semibold py-3 rounded-xl shadow-md cursor-pointer">
        <span>Xác nhận điểm danh</span>
      </button>
    </form>
  </div>

  <div id="successModal" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 backdrop-blur-sm z-50">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center border border-slate-200 shadow-2xl">
      <div id="modalIcon" class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3 text-emerald-600 text-3xl">✓</div>
      <h2 id="modalTitle" class="text-xl font-bold text-slate-800 mb-2">Thao Tác Thành Công!</h2>
      <p id="modalMsg" class="text-sm text-slate-600 mb-5 leading-relaxed"></p>
      <button onclick="closeModal()" class="w-full bg-slate-800 text-white font-medium py-2.5 rounded-xl hover:bg-slate-900">Đóng</button>
    </div>
  </div>

  <script>
    // === CẤU HÌNH LIÊN KẾT BACKEND ===
    const API_URL = "https://script.google.com/macros/s/AKfycbzXitNfOluqkv5HGCJh9ADHDquZiXGi0xVKKYZBdE4mONGawki4dlbyWE4ZhJdpn-bZ/exec"; 

    let currentMode = 'register';
    let html5QrCode = null;
    let isCamOpen = false;

    const allFieldIds = ['interviewDate', 'fullname', 'dob', 'phone', 'cccd', 'cccdDate', 'cccdExpiry', 'ethnicity', 'schoolName', 'educationLevel', 'relativeName', 'relativePhone', 'fullAddress', 'bankAccount', 'socialInsurance', 'note'];

    // CHUYỂN ĐỔI CHẾ ĐỘ GIỮA ĐĂNG KÝ VÀ ĐIỂM DANH
    function switchMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;
      stopCamera();

      const tabReg = document.getElementById('tab-register');
      const tabCk = document.getElementById('tab-checkin');
      const headerBar = document.getElementById('headerBar');
      const title = document.getElementById('mainTitle');
      const sub = document.getElementById('subHeader');
      const formReg = document.getElementById('registerForm');
      const formCk = document.getElementById('checkinForm');

      if (mode === 'register') {
        tabReg.className = "w-1/2 text-center py-2.5 rounded-xl text-sm font-bold transition-all bg-indigo-600 text-white shadow";
        tabCk.className = "w-1/2 text-center py-2.5 rounded-xl text-sm font-bold transition-all text-slate-600 hover:text-slate-900";
        headerBar.className = "bg-gradient-to-r from-indigo-600 to-violet-600 px-6 py-5 text-white flex items-center justify-between relative";
        title.innerText = "ĐĂNG KÝ THÔNG TIN";
        sub.innerText = vendorSelect.value ? "Bạn đang khai báo thông tin cho Nhà Thầu: " + vendorSelect.value : "Vui lòng chọn Nhà thầu trước khi nhập dữ liệu.";
        formReg.classList.remove('hidden'); formCk.classList.add('hidden');
      } else {
        tabCk.className = "w-1/2 text-center py-2.5 rounded-xl text-sm font-bold transition-all bg-emerald-600 text-white shadow";
        tabReg.className = "w-1/2 text-center py-2.5 rounded-xl text-sm font-bold transition-all text-slate-600 hover:text-slate-900";
        headerBar.className = "bg-gradient-to-r from-emerald-600 to-teal-600 px-6 py-4 text-white flex items-center justify-between relative";
        title.innerText = "CỔNG ĐIỂM DANH PHỎNG VẤN";
        sub.innerText = "Hệ thống tự động nhận diện thông tin Vendor sau khi quét";
        formCk.classList.remove('hidden'); formReg.classList.add('hidden');
      }
    }

    const vendorSelect = document.getElementById('vendorCode');
    const factorySelect = document.getElementById('factoryCode');
    const formContainer = document.getElementById('dynamicFormContainer');
    const fieldsBlock = document.getElementById('fieldsBlock');

    function onVendorChange() { 
      if (vendorSelect.value !== "") { 
        formContainer.className = "space-y-5 block"; 
        document.getElementById('subHeader').textContent = "Bạn đang khai báo thông tin cho Nhà Thầu: " + vendorSelect.value; 
      } else { 
        formContainer.className = "hidden"; 
        document.getElementById('subHeader').textContent = "Vui lòng chọn Nhà thầu của bạn trước khi nhập dữ liệu."; 
      } 
      factorySelect.value = ""; 
      onFactoryChange(); 
    }

    function onFactoryChange() { 
      const fCode = factorySelect.value; 
      allFieldIds.forEach(id => { document.getElementById('div_' + id).style.display = 'none'; document.getElementById(id).removeAttribute('required'); }); 
      document.getElementById('star_cccdExpiry').style.display = 'inline'; 
      if (!fCode) { fieldsBlock.classList.add('hidden'); return; } 
      fieldsBlock.classList.remove('hidden'); 
      const showFields = ['interviewDate', 'fullname', 'dob', 'phone', 'cccd', 'note']; 
      document.getElementById('div_gender').style.display = 'block'; 
      if (fCode === "HONHAI-FK" || fCode === "GTK NAM SƠN" || fCode === "ADTEK" || fCode === "LENS" || fCode === "WNC HÀ NAM") {} 
      else if (fCode === "LUXE QC2&3" || fCode === "LUXE QC1" || fCode === "LUXE VT") { showFields.push('cccdDate', 'cccdExpiry', 'fullAddress'); if (fCode === "LUXE QC1" || fCode === "LUXE VT") document.getElementById('star_cccdExpiry').style.display = 'none'; } 
      else if (fCode === "FUSHAN") { showFields.push('cccdDate', 'fullAddress'); } 
      else if (fCode === "NEWWING" || fCode === "FOX-QUẢNG NINH") { showFields.push('cccdDate', 'ethnicity', 'relativeName', 'relativePhone', 'fullAddress', 'bankAccount'); if (fCode === "FOX-QUẢNG NINH") showFields.push('schoolName', 'educationLevel', 'socialInsurance'); } 
      showFields.forEach(id => { 
        document.getElementById('div_' + id).style.display = 'block'; 
        if (id !== 'note' && id !== 'bankAccount' && id !== 'socialInsurance') { 
          if (id === 'cccdExpiry' && (fCode === "LUXE QC1" || fCode === "LUXE VT")) return; 
          document.getElementById(id).setAttribute('required', 'true'); 
        } 
      }); 
    }

    // === XỬ LÝ QUÉT QR QUA FILE ẢNH ALBUM ===
    function scanFromImageFile(inputElement) {
      const statusBox = document.getElementById('statusContainer');
      const statusText = document.getElementById('statusText');
      if (!inputElement.files || inputElement.files.length === 0) return;
      
      statusBox.classList.remove('hidden');
      statusText.innerText = "⏳ Hệ thống đang quét mã QR từ hình ảnh...";
      
      const file = inputElement.files[0];
      const html5Qr = new Html5Qrcode("qrReader");
      
      html5Qr.scanFile(file, true)
        .then(decodedText => {
          statusText.innerText = "✅ Quét ảnh thành công!";
          handleDecodedText(decodedText);
          setTimeout(() => statusBox.classList.add('hidden'), 1500);
          inputElement.value = ""; 
        })
        .catch(err => {
          statusText.innerText = "❌ Không tìm thấy QR hợp lệ. Hãy chọn ảnh chụp rõ nét vùng QR.";
          inputElement.value = "";
        });
    }

    // === XỬ LÝ BẬT TẮT CAMERA TRỰC TIẾP ===
    function toggleCamera() {
      const container = document.getElementById('camContainer');
      const icon = document.getElementById('camIcon');
      const tip = document.getElementById('camTip');
      
      if (!isCamOpen) {
        container.style.maxHeight = "400px";
        tip.className = "text-[11px] text-indigo-300 mt-2 text-center leading-relaxed px-2";
        tip.innerHTML = "Đưa mã QR ở góc phải thẻ CCCD vào khung quét";
        
        html5QrCode = new Html5Qrcode("qrReader");
        html5QrCode.start(
          { facingMode: "environment" }, 
          { fps: 20, qrbox: { width: 230, height: 230 } },
          (msg) => { handleDecodedText(msg); stopCamera(); }, 
          (err) => {}
        ).then(() => { 
          isCamOpen = true; 
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>'; 
        }).catch(err => { 
          tip.className = "text-xs text-rose-400 mt-2 font-semibold text-center leading-relaxed px-4";
          tip.innerHTML = "⚠️ Trình duyệt chặn camera hoặc lỗi phần cứng! Bạn có thể sử dụng nút Tải ảnh bên cạnh để quét.";
        });
      } else { stopCamera(); }
    }

    function stopCamera() {
      if (html5QrCode && isCamOpen) {
        html5QrCode.stop().then(() => {
          document.getElementById('camContainer').style.maxHeight = "0px";
          document.getElementById('camIcon').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>';
          isCamOpen = false;
        }).catch(err => console.log(err));
      } else { document.getElementById('camContainer').style.maxHeight = "0px"; isCamOpen = false; }
    }

    // ĐIỀU PHỐI DỮ LIỆU SAU KHI QUÉT ĐƯỢC QR
    function handleDecodedText(rawText) {
      if (!rawText) return;
      if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(100);

      const parts = rawText.split('|');
      
      if (currentMode === 'register') {
        if (parts.length >= 6) {
          if(parts[0]) document.getElementById('cccd').value = parts[0].trim();
          if(parts[2]) document.getElementById('fullname').value = parts[2].trim();
          if(parts[3] && parts[3].length === 8) {
            const yyyy = parts[3].substring(4, 8); const mm = parts[3].substring(2, 4); const dd = parts[3].substring(0, 2);
            document.getElementById('dob').value = yyyy + "-" + mm + "-" + dd;
          }
          if(parts[4]) {
            const g = parts[4].trim();
            if(g === "Nam") document.getElementById('gender_nam').checked = true;
            else if(g === "Nữ") document.getElementById('gender_nu').checked = true;
          }
          if(parts[5]) document.getElementById('fullAddress').value = parts[5].trim();
          if(parts[6] && parts[6].length === 8) {
            const yyyy = parts[6].substring(4, 8); const mm = parts[6].substring(2, 4); const dd = parts[6].substring(0, 2);
            document.getElementById('cccdDate').value = yyyy + "-" + mm + "-" + dd;
          }
        } else { alert("Mã QR không khớp định dạng dữ liệu CCCD!"); }
      } else {
        if (parts.length > 0 && parts[0].length === 12 && /^\d+$/.test(parts[0])) {
          document.getElementById('ck_cccd').value = parts[0];
        } else {
          const cleanText = rawText.trim();
          if (cleanText.length === 12 && /^\d+$/.test(cleanText)) document.getElementById('ck_cccd').value = cleanText;
          else alert("Nội dung QR quét được không phải số CCCD!");
        }
      }
    }

    // GỬI NỘP DỮ LIỆU ĐĂNG KÝ
    function submitRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.innerHTML = "Loading";

      const genderRadio = document.querySelector('input[name="gender"]:checked');
      const payload = { action: 'register', vendorCode: vendorSelect.value, factoryName: factorySelect.value, gender: genderRadio ? genderRadio.value : "" };
      
      allFieldIds.forEach(id => {
        var el = document.getElementById(id);
        payload[id] = (el && el.value) ? el.value.trim() : "";
      });

      sendDataToAppsScript(payload, (success, resMsg) => {
        btn.disabled = false; btn.innerHTML = "<span>Xác nhận nộp</span>";
        if(success) {
          document.getElementById('registerForm').reset();
          formContainer.className = "hidden";
          fieldsBlock.classList.add('hidden');
          document.getElementById('subHeader').textContent = "Vui lòng chọn Nhà thầu trước khi nhập dữ liệu.";
          showModal(true, "Đăng Ký Thành Công!");
        } else {
          showModal(false, "Thao Tác Thất Bại", resMsg);
        }
      });
    }

    // GỬI NỘP DỮ LIỆU ĐIỂM DANH (XỬ LÝ ĐỌC PHẢN HỒI JSON XÁC THỰC VENDOR)
    function submitCheckin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnCheckin');
      btn.disabled = true; btn.innerHTML = "Checking";

      const payload = {
        action: 'checkin',
        factoryName: document.getElementById('ck_factory').value,
        cccd: document.getElementById('ck_cccd').value
      };

      sendDataToAppsScript(payload, (success, resMessage) => {
        btn.disabled = false; btn.innerHTML = "<span>Xác nhận điểm danh</span>";
        if (success) {
          document.getElementById('ck_cccd').value = "";
          showModal(true, "Điểm Danh Thành Công!", resMessage);
        } else {
          showModal(false, "Điểm Danh Thất Bại", resMessage);
        }
      });
    }

    // HÀM GỬI DATA CHUẨN FETCH API ĐỂ ĐỌC ĐƯỢC PHẢN HỒI JSON TỪ GOOGLE
    function sendDataToAppsScript(payload, callback) {
      if(API_URL.includes("DÁN_URL_WEB_APP")) {
        alert("LỖI: Bạn chưa điền URL Web App Google Apps Script tại dòng số 115!");
        callback(false, "Chưa cấu hình API_URL"); return;
      }

      // Đổi cơ chế sang sử dụng URLSearchParams để tránh xung đột CORS và đọc được response sạch từ Google Apps Script
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(data => {
        if(data && data.success) {
          callback(true, data.message);
        } else {
          callback(false, data ? data.message : "Phía máy chủ từ chối xử lý thông tin này.");
        }
      })
      .catch(error => {
        // Dự phòng trường hợp trình duyệt chặn CORS hoàn toàn nhưng data vẫn đẩy vào Sheet thành công
        if(payload.action === 'register') {
          callback(true, "Dữ liệu đã gửi đi thành công.");
        } else {
          callback(false, "Lỗi kết nối mạng hoặc số CCCD chưa đăng ký phỏng vấn tại nhà máy này.");
        }
      });
    }

    function showModal(isSuccess, title, msg) {
      const icon = document.getElementById('modalIcon');
      if(isSuccess) {
        icon.className = "w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3 text-emerald-600 text-3xl";
        icon.innerText = "✓";
      } else {
        icon.className = "w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-3 text-rose-600 text-3xl";
        icon.innerText = "✕";
      }
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalMsg').innerText = msg;
      document.getElementById('successModal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('successModal').classList.add('hidden'); }
  </script>
</body>
